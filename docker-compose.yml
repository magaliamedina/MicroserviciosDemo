version: '3.8'

services:
  catalogservice:
    build: ./CatalogService
    ports:
      - "5001:8080"

  orderservice:
    build: ./OrderService
    ports:
      - "5002:8080"

  paymentservice:
    build: ./PaymentService
    ports:
      - "5003:8080"

  apigateway:
    build: ./ApiGateway
    ports:
      - "5000:8080"
    depends_on:
      - catalogservice
      - orderservice
      - paymentservice